# =============================================================================
# Sentrix Mark 2 - Layout B sensor topology
# Origin: DERIV Table 9 (build-ready detail) + BUILD Part 5/6, reconciled to the
# frozen Rev-B as-built distribution (sentrix_mark2_revb_change_package.md SEC D).
# 21x BMM350 + 3x LIS2DTW12.  Palmar sensing faces; dorsal routing.
# Per-finger BMM counts MATCH the populated board: thumb 4, index 5, middle 4,
# ring 3, pinky 1, palm 4 (= 21).  Flat rigid validation board -> identity frames.
#
# Positions are in the HAND frame (millimetres), x=ulnar->radial,
# y=proximal->distal, z=dorsal->palmar(+).  Fingertip cluster centres are
# nominal placeholders (geo.sensor_coords is UNKNOWN); within-cluster offsets
# are synthesized from geo.cluster_pitch_mm and the named arrangement.
# =============================================================================
name: layout_B
clusters:
  - finger: thumb
    center_mm: [-30.0, 40.0, 8.0]
    arrangement: quad          # plus/quad -> 4 sensors
    n_bmm350: 4
    dynamics: true             # 1x LIS2DTW12
  - finger: index
    center_mm: [-10.0, 95.0, 8.0]
    arrangement: quincunx      # quad + centre -> 5 sensors (board: U24,U30-U33)
    n_bmm350: 5
    dynamics: true
  - finger: middle
    center_mm: [2.0, 100.0, 8.0]
    arrangement: quad
    n_bmm350: 4
    dynamics: true
  - finger: ring
    center_mm: [14.0, 92.0, 8.0]
    arrangement: triangle      # 3 sensors
    n_bmm350: 3
    dynamics: false
  - finger: pinky
    center_mm: [26.0, 78.0, 8.0]
    arrangement: single        # 1 sensor (board: U29 only)
    n_bmm350: 1
    dynamics: false
  - finger: palm
    center_mm: [0.0, 30.0, 6.0]
    arrangement: coarse_grid   # 4 sensors: thenar/center/hypothenar/lower
    n_bmm350: 4
    dynamics: false
