# =============================================================================
# SentrixSim v1 - MASTER PARAMETER REGISTRY
# =============================================================================
# Single source of truth for every simulator parameter.
#
# tier:        KNOWN | ESTIMATED | UNKNOWN
#   KNOWN      - datasheet-authoritative OR explicitly frozen in a Sentrix doc
#   ESTIMATED  - derived from a base value, standard physics, or a documented
#                engineering choice (NOT a physical claim)
#   UNKNOWN    - not specified anywhere; MUST be measured on hardware.
#                value is null and enabled=false -> the sim refuses to use it
#                silently (raises UnknownParameterError) unless run with
#                --allow-placeholders, which stamps physics_fidelity=placeholder.
#
# confidence:  0.0 - 1.0   (see README confidence scale C1..C5)
# origin:      provenance string (document + section, or datasheet)
# enabled:     if false and tier==UNKNOWN, the parameter cannot be read silently
# placeholder_range: [lo, hi]  used ONLY under --allow-placeholders
# =============================================================================

